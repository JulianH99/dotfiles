[colors]
background = #16161D
background-alt = #1F1F28
white = #ffffff
foreground = #DCD7BA
primary = #E6C384
secondary = #98BB6C
alert = #E46876
disabled = #717C7C

[bar/bar]
width = 100%
height = 23pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 5
padding-right = 5

module-margin = 3

separator = |
separator-foreground = ${colors.disabled}

font-0 = Ubuntu:pixelsize=10;2
font-1 = Symbols Nerd Font:pixelsize=10;2

modules-left = workspaces xwindow
modules-center = date
modules-right = pulseaudio cpu memory xkeyboard systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 5pt
tray-spacing = 3pt


[module/workspaces]
type = internal/i3
format = <label-state>
index-sort = true
wrapping-scroll = false
strip-wsnumbers = true

label-mode = %name%
label-mode-padding = 2

label-focused = %name%
label-focused-foreground = ${colors.primary}
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-foreground = ${colors.disabled}
label-unfocused-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 2

label-visible = %name%
label-visible-padding = 2



[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
foreground = ${colors.white}

[module/date]
type = custom/script
exec = ~/.config/polybar/scripts/date.sh
interval = 1
tail = true

label = %output%
label-foreground = ${colors.primary}

click-left = "/home/julian/.config/i3/scripts/calendar.sh"
click-middle = "ghostty -e calcurse"

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = ""
format-volume-prefix-foreground = ${colors.primary}
format-volume = <ramp-volume>  <label-volume>

label-volume = %percentage%%

label-muted = ÓĽ®
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = "ÔÄ¶"
ramp-volume-1 = "ÔÄß"
ramp-volume-2 = "ÔÄ®"

click-right = pavucontrol

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

